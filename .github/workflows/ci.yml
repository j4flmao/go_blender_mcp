name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: blender-mcp-go/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm ci || true
        working-directory: npm
      - run: npm run build:all
        working-directory: npm
